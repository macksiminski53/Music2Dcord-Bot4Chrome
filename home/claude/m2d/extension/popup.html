<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Music2Dcord</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f14;
      color: #e8e8ed;
    }

    .header {
      background: linear-gradient(135deg, #1a1428, #0f0f14);
      padding: 16px 18px 14px;
      border-bottom: 1px solid #252535;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo { font-size: 22px; }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: #e8e8ed;
    }

    .header-text p {
      font-size: 11px;
      color: #8888a0;
      margin-top: 1px;
    }

    .body { padding: 16px 18px; }

    /* Not connected state */
    #state-disconnected { display: none; }
    #state-connected { display: none; }

    .connect-btn {
      width: 100%;
      padding: 11px;
      background: #7c5bf5;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .connect-btn:hover { background: #6a47e8; }

    .connect-desc {
      font-size: 12px;
      color: #8888a0;
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    /* Connected state */
    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #16161f;
      border: 1px solid #252535;
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c5bf5, #3fc7ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .connected-badge {
      font-size: 10px;
      background: rgba(52, 211, 153, 0.15);
      color: #34d399;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .now-playing-card {
      background: #16161f;
      border: 1px solid #252535;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .np-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7c5bf5;
      margin-bottom: 6px;
    }

    .np-label.idle { color: #55556a; }

    .np-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .np-artist {
      font-size: 11px;
      color: #8888a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .np-source {
      font-size: 10px;
      color: #55556a;
      margin-top: 4px;
    }

    .disconnect-btn {
      width: 100%;
      padding: 9px;
      background: transparent;
      border: 1px solid #252535;
      border-radius: 10px;
      color: #8888a0;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .disconnect-btn:hover { border-color: #f04747; color: #f04747; }

    .loading {
      text-align: center;
      padding: 24px 0;
      color: #55556a;
      font-size: 12px;
    }

    .footer {
      padding: 10px 18px;
      border-top: 1px solid #252535;
      font-size: 10px;
      color: #55556a;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎵</div>
    <div class="header-text">
      <h1>Music2Dcord</h1>
      <p>Discord status from your browser</p>
    </div>
  </div>

  <div class="body">
    <div class="loading" id="state-loading">Loading…</div>

    <div id="state-disconnected">
      <p class="connect-desc">Connect your Discord account to show what you're listening to as your status.</p>
      <button class="connect-btn" id="btn-connect">🔗 Connect Discord</button>
    </div>

    <div id="state-connected">
      <div class="user-row">
        <div class="user-avatar">👤</div>
        <div class="user-name" id="username-label">—</div>
        <div class="connected-badge">Connected</div>
      </div>

      <div class="now-playing-card">
        <div class="np-label idle" id="np-label">Nothing detected</div>
        <div class="np-title" id="np-title">Play music in a supported tab</div>
        <div class="np-artist" id="np-artist"></div>
        <div class="np-source" id="np-source"></div>
      </div>

      <button class="disconnect-btn" id="btn-disconnect">Disconnect</button>
    </div>
  </div>

  <div class="footer">
    Works with YouTube Music, Spotify, Apple Music &amp; more
  </div>

  <script src="popup.js"></script>
</body>
</html>
